version: 2
updates:
  # root library only
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: 'monthly'
      day: 'friday'
      time: '18:00'
      timezone: 'Europe/Moscow'
    open-pull-requests-limit: 10
    assignees:
      - 'whidrubeld'
    commit-message:
      prefix: 'deps-dev'
      include: 'scope'
    # exclude example app deps (update via: npx expo install --fix)
    ignore:
      - dependency-name: 'expo'
      - dependency-name: 'expo-*'
      - dependency-name: '@expo/*'
      - dependency-name: 'react-dom'
      - dependency-name: 'react-native-web'
      - dependency-name: 'react-native-safe-area-context'
      - dependency-name: 'react-native-monorepo-config'
    groups:
      # all dev dependencies in one PR
      all-dev-dependencies:
        patterns:
          - '*'
