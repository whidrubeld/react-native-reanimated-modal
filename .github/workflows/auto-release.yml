name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.check.outputs.version-changed }}
      new-version: ${{ steps.check.outputs.new-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          CURRENT_VERSION=$(jq -r '.version' package.json)
          git checkout HEAD~1 -- package.json || echo "{}" > package.json.old
          OLD_VERSION=$(jq -r '.version' package.json.old 2>/dev/null || echo "0.0.0")
          git checkout HEAD -- package.json

          if [ "$CURRENT_VERSION" != "$OLD_VERSION" ]; then
            echo "version-changed=true" >> $GITHUB_OUTPUT
            echo "new-version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "version-changed=false" >> $GITHUB_OUTPUT
          fi

  auto-release:
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build library
        run: yarn prepare

      - name: Run tests
        run: yarn test

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${{ needs.check-version.outputs.new-version }}
          CHANGELOG=$(git log --oneline --pretty=format:"- %s" $(git describe --tags --abbrev=0)..HEAD 2>/dev/null || git log --oneline --pretty=format:"- %s" | head -10)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.check-version.outputs.new-version }}
          release_name: Release v${{ needs.check-version.outputs.new-version }}
          body: |
            ## Changes in v${{ needs.check-version.outputs.new-version }}

            ${{ steps.changelog.outputs.changelog }}

            ## Installation
            ```bash
            npm install react-native-reanimated-modal@${{ needs.check-version.outputs.new-version }}
            # or
            yarn add react-native-reanimated-modal@${{ needs.check-version.outputs.new-version }}
            ```
          draft: false
          prerelease: ${{ contains(needs.check-version.outputs.new-version, 'alpha') || contains(needs.check-version.outputs.new-version, 'beta') || contains(needs.check-version.outputs.new-version, 'rc') }}
